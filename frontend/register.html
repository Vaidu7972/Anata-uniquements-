<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ananta Techtonic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-layer-group text-accent me-2"></i>Ananta<span
                    class="text-gradient">Techtonic</span>
            </a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="glass-panel p-5 position-relative overflow-hidden">

                    <!-- Decorative blur -->
                    <div class="position-absolute top-0 start-0 w-100 h-100 z-0"
                        style="background: radial-gradient(circle at bottom left, rgba(0,206,201,0.15), transparent 60%); pointer-events: none;">
                    </div>

                    <div class="position-relative z-1">
                        <div class="text-center mb-5">
                            <h2 class="text-white mb-2">Join the <span class="text-gradient">Network</span></h2>
                            <p class="text-muted mb-0">Create your identity in the cashless economy.</p>
                        </div>

                        <div id="alertBox" class="alert d-none rounded-3" role="alert"></div>

                        <form id="registerForm">
                            <div class="mb-4">
                                <label for="name" class="form-label ms-1">Designation (Full Name)</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                            class="fa-solid fa-user-astronaut"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="name" required
                                        placeholder="Neo">
                                </div>
                            </div>
                            <div class="row g-4 mb-4">
                                <div class="col-md-6">
                                    <label for="email" class="form-label ms-1">Email Nexus</label>
                                    <div class="input-group">
                                        <span
                                            class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                                class="fa-solid fa-envelope"></i></span>
                                        <input type="email" class="form-control border-start-0 ps-0" id="email" required
                                            placeholder="neo@matrix.io">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label ms-1">Commlink (Phone)</label>
                                    <div class="input-group">
                                        <span
                                            class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                                class="fa-solid fa-phone"></i></span>
                                        <input type="tel" class="form-control border-start-0 ps-0" id="phone"
                                            placeholder="+00 0000 0000">
                                    </div>
                                </div>
                            </div>
                            <div class="mb-5">
                                <label for="password" class="form-label ms-1">Security Key (Password)</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                            class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password"
                                        required placeholder="••••••••">
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-accent btn-lg rounded-pill">
                                    <i class="fa-solid fa-power-off me-2"></i> Register Node
                                </button>
                                <div class="text-center mt-3">
                                    <span class="text-muted">Already synchronized?</span>
                                    <a href="login.html"
                                        class="text-accent text-decoration-none fw-bold ms-1 hover-glow">Login here</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="app.js"></script>
</body>

</html>
