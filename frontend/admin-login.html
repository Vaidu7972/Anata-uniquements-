<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Ananta Techtonic</title>
    <meta name="description" content="Secure admin login portal for Ananta Techtonic platform management.">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shared styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-badge {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            border-radius: 50px;
            padding: 4px 14px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .admin-login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(108, 92, 231, 0.2));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(239, 68, 68, 0.6), transparent);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fa-solid fa-layer-group text-accent me-2"></i>Ananta<span
                    class="text-gradient">Techtonic</span>
            </a>
            <span class="admin-badge ms-auto">
                <i class="fa-solid fa-shield-halved me-1"></i> Admin Portal
            </span>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="glass-panel p-5 position-relative overflow-hidden">
                    <!-- Scan animation -->
                    <div class="scan-line"></div>

                    <!-- Red decorative orb -->
                    <div class="position-absolute top-0 start-0 w-100 h-100 z-0"
                        style="background: radial-gradient(circle at top right, rgba(239,68,68,0.15), transparent 50%); pointer-events:none;">
                    </div>

                    <div class="position-relative z-1">
                        <!-- Icon -->
                        <div class="admin-login-icon">
                            <i class="fa-solid fa-lock text-danger"></i>
                        </div>

                        <div class="text-center mb-4">
                            <h2 class="text-white mb-1">Admin <span class="text-gradient">Access</span></h2>
                            <p class="text-muted mb-0 small font-monospace">CLASSIFIED // RESTRICTED ZONE</p>
                        </div>

                        <div id="alertBox" class="alert d-none rounded-3" role="alert"></div>

                        <form id="adminLoginForm">
                            <div class="mb-4">
                                <label for="adminEmail" class="form-label ms-1">Admin Email Nexus</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-end-0 border-secondary text-danger">
                                        <i class="fa-solid fa-envelope"></i>
                                    </span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="adminEmail"
                                        required placeholder="root@nexus.com">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="adminPassword" class="form-label ms-1">Security Key</label>
                                <div class="input-group">
                                    <span
                                        class="input-group-text bg-transparent border-end-0 border-secondary text-danger">
                                        <i class="fa-solid fa-key"></i>
                                    </span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="adminPassword"
                                        required placeholder="••••••••">
                                </div>
                            </div>
                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-lg rounded-pill fw-bold" id="adminLoginBtn"
                                    style="background: linear-gradient(135deg, #c0392b, #e74c3c); border: none; color: #fff; box-shadow: 0 4px 15px rgba(239,68,68,0.4);">
                                    <i class="fa-solid fa-unlock-keyhole me-2"></i> Authorize Access
                                </button>
                                <a href="login.html" class="btn btn-outline-secondary rounded-pill">
                                    <i class="fa-solid fa-arrow-left me-2"></i> Back to User Login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Backend logic
        const LOCAL_BASE = 'http://localhost:3000';
        const HOSTED_BASE = 'https://anata-backend.onrender.com';
        let API = HOSTED_BASE;
        (async function detectLocalBackend() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 800);
                const res = await fetch(LOCAL_BASE + '/api/health', { signal: controller.signal });
                clearTimeout(timeoutId);
                if (res && res.ok) API = LOCAL_BASE;
            } catch (err) { }
        })();

        function showAlert(msg, type = 'danger') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type} rounded-3`;
            box.textContent = msg;
            box.classList.remove('d-none');
            if (type === 'success') setTimeout(() => box.classList.add('d-none'), 3000);
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('adminLoginBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Authenticating...';

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            try {
                const res = await fetch(`${API}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.message || data.error || 'Login failed.');
                    return;
                }
                if (data.user.role !== 'admin') {
                    showAlert('Access denied. Admin privileges required.');
                    return;
                }
                // Store admin-specific token
                localStorage.setItem('adminToken', data.token);
                localStorage.setItem('adminUser', JSON.stringify(data.user));
                showAlert('Access authorized. Redirecting...', 'success');
                setTimeout(() => window.location.href = 'admin.html', 800);
            } catch (err) {
                showAlert('Connection error. Check server status.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-unlock-keyhole me-2"></i> Authorize Access';
            }
        });

        // Redirect if already logged in as admin
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('adminToken');
            if (token) window.location.href = 'admin.html';
        });
    </script>
</body>

</html>
